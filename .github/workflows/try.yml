name: Try

on:
  push:
  pull_request:

jobs:
  test-build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-mingw-w64-i686 \
            gcc-mingw-w64-i686 \
            make

      - name: Test build
        run: make test-build

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-mingw-w64-i686 \
            gcc-mingw-w64-i686 \
            make \
            ripgrep

      - name: Tests
        run: make smoke
