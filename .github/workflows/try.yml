name: Try

on:
  push:
  pull_request:

jobs:
  test-build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-mingw-w64-i686 \
            gcc-mingw-w64-i686 \
            make

      - name: Test build
        run: |
          mkdir -p build
          make clean
          make TARGET=build/gw32time-test.exe STRIP=:

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-mingw-w64-i686 \
            gcc-mingw-w64-i686 \
            make \
            ripgrep

      - name: Tests
        run: scripts/smoke/run.sh
